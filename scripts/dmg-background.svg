<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Warm off-white background matching the app -->
  <rect width="600" height="400" fill="#F7F6F3"/>

  <!-- Subtle radial glow behind app icon position -->
  <radialGradient id="glow" cx="35%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#E8E7E3" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#F7F6F3" stop-opacity="0"/>
  </radialGradient>
  <rect width="600" height="400" fill="url(#glow)"/>

  <!-- Arrow between icon and Applications — soft, minimal -->
  <g transform="translate(285, 195)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#C4C3BF" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="16,-5 22,0 16,5" fill="none" stroke="#C4C3BF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- "drag to Applications" hint -->
  <text
    x="300" y="315"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="400"
    fill="#C4C3BF"
    text-anchor="middle"
    letter-spacing="0.3"
  >drag to Applications to install</text>
</svg>
